kind = "web"
previewPath = "/"
title = "Mky"
version = "1.0.0"
id = "artifacts/mky"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25167

[services.development]
run = "pnpm --filter @workspace/mky run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mky", "run", "build" ]
publicDir = "artifacts/mky/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25167"
BASE_PATH = "/"
